# docker-compose.yml
version: "3.8"

services:
  # Next.js API/Frontend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - UPSTASH_REDIS_URL=rediss://default:pass@redis:6379
    depends_on:
      - redis

  # Notification Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - UPSTASH_REDIS_URL=rediss://default:pass@redis:6379
    depends_on:
      - redis

  # Local Redis for Development
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass pass
    ports:
      - "6379:6379"
